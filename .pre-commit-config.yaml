# Local fast static-analysis layer for gtm-engine.
#
# All four tools run at the pre-commit stage (commits stay fast: Ruff/Bandit run
# only on changed files; the custom Semgrep rules are offline and tiny; gitleaks
# scans only staged content). The heavy Semgrep *registry* deep-scan (p/python,
# p/security-audit) is deliberately NOT here — it runs only at the `main` gate in
# .github/workflows/static-analysis.yml.
#
# Setup:
#   uv sync --extra lint
#   uv run pre-commit install
#
# Pins are mirrored in pyproject.toml ([project.optional-dependencies] lint) and
# the CI workflow — bump all three together.
default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff          # lint (autofix what's safe)
        args: [--fix]
      - id: ruff-format   # formatter

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/semgrep/semgrep
    rev: v1.167.0
    hooks:
      - id: semgrep
        # Custom invariant rules only — offline, no registry fetch, no telemetry.
        args:
          - "--config"
          - ".semgrep/"
          - "--error"
          - "--metrics=off"
          - "--disable-version-check"
          - "--skip-unknown-extensions"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Scans STAGED content locally — catches a `git add -f .env` before it is
        # committed. The CI gitleaks job (.github/workflows/ci.yml) runs `gitleaks
        # detect` in history mode and by design never sees the gitignored working
        # tree, so this hook closes that local gap. Same binary version as CI.
